services:
  app:
    image: ghcr.io/basketikun/chatgpt2api:latest
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3222:80"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    networks:
      - chatgpt2api
      - apinetwork

  db:
    image: postgres:16-alpine
    container_name: chatgpt2api-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 500m
    networks:
      - chatgpt2api

networks:
  chatgpt2api:
    name: chatgpt2api
  apinetwork:
    name: apinetwork
